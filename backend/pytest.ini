[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -q
markers =
    unit: pure unit tests with no external dependencies
    integration: tests that require database/Redis/Qdrant
    slow: tests that are intentionally slow
